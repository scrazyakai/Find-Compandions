# 公共基础配置
spring:
  application:
    name: findcompanions
  # 默认激活 dev 环境。在生产环境，通过环境变量 SPRING_PROFILES_ACTIVE=prod 来覆盖此配置
  profiles:
    active: dev
  # session 配置
  session:
    # 存储到redis中
    store-type: redis
    # session 超时时间，从 24 小时缩短为 1 小时 (3600秒)
    timeout: 3600
# 让spring boot项目支持通过代理访问
server:
  forward-headers-strategy: native
  servlet:
    context-path: /api

# Mybatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启下划线到驼峰的自动映射
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0 # 逻辑未删除值

# 阿里云 OSS 配置 (密钥通过环境变量读取)
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucketName: akainews
    accessKeyId: ${OSS_ACCESS_KEY_ID}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
