# 公共基础配置
spring:
  application:
    name: findcompanions
  # 默认激活 dev 环境。在生产环境，通过环境变量 SPRING_PROFILES_ACTIVE=prod 来覆盖此配置
  profiles:
    active: dev
  # session 配置
# 让spring boot项目支持通过代理访问
server:
  forward-headers-strategy: native
  servlet:
    context-path: /api

# Mybatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启下划线到驼峰的自动映射
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0 # 逻辑未删除值

# 阿里云 OSS 配置 (密钥通过环境变量读取)
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucketName: akainews
    accessKeyId: ${OSS_ACCESS_KEY_ID}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
sa-token:
  # token 名称（同时也是 cookie 名称）

  token-name: satoken
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 259200
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET:akai}

# RocketMQ 配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:user_sync_producer_group}

# MySQL -> ES 增量同步配置（Canal + MQ）
sync:
  canal:
    enabled: ${SYNC_CANAL_ENABLED:false}
    host: ${CANAL_HOST:127.0.0.1}
    port: ${CANAL_PORT:11111}
    destination: ${CANAL_DESTINATION:example}
    username: ${CANAL_USERNAME:}
    password: ${CANAL_PASSWORD:}
    database: ${CANAL_DATABASE:find_companions}
    table: ${CANAL_TABLE:user}
    batch-size: ${CANAL_BATCH_SIZE:100}
    poll-interval-ms: ${CANAL_POLL_INTERVAL_MS:1000}
  mq:
    enabled: ${SYNC_MQ_ENABLED:true}
    topic: ${SYNC_MQ_TOPIC:user_sync_topic}
    consumer-group: ${SYNC_MQ_CONSUMER_GROUP:user_sync_consumer_group}
