# 生产环境配置 (prod)
# 密钥等敏感信息必须通过环境变量配置，而不是写在这里
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产数据库地址，从环境变量读取
    url: jdbc:mysql://${DB_HOST:117.72.163.64}:${DB_PORT:3306}/${DB_NAME:findcompanionsdb}?useSSL=false&serverTimezone=UTC
    # 生产数据库用户和密码，从环境变量读取
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  redis:
    # 生产 Redis 地址，从环境变量读取
    host: ${REDIS_HOST:117.72.163.64}
    port: ${REDIS_PORT:6379}
    database: 0
    # 生产 Redis 用户和密码，从环境变量读取
    username: ${REDIS_USERNAME:default}
    password: ${REDIS_PASSWORD}

server:
  port: 8080